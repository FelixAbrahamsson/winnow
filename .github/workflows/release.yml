name: release

# Build the Rust/GTK4 binary and attach it to a GitHub Release whenever a
# version tag (e.g. v0.2.0) is pushed:
#
#     git tag v0.2.0 && git push origin v0.2.0
#
# The binary is dynamically linked against the system GTK4 (~1-2 MB); users
# need the GTK4 runtime installed (see install.sh).
on:
  push:
    tags: ["v*"]
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  linux-x86_64:
    # Build on the oldest supported runner for the widest glibc/GTK compatibility.
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - name: Install GTK4 dev libraries
        run: |
          sudo apt-get update
          sudo apt-get install -y libgtk-4-dev

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: rust

      - name: Build release binary
        working-directory: rust
        run: cargo build --release -p winnow-gui --locked

      - name: Package
        run: |
          install -m755 rust/target/release/winnow winnow
          tar -czf winnow-linux-x86_64.tar.gz winnow
          sha256sum winnow-linux-x86_64.tar.gz | tee winnow-linux-x86_64.tar.gz.sha256

      - name: Publish release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            winnow-linux-x86_64.tar.gz
            winnow-linux-x86_64.tar.gz.sha256
          generate_release_notes: true
